# This is a basic workflow to help you get started with Actions

name: Export Web

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Download Godot
        run: |
          wget "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          7z x Godot_v4.6.2-stable_linux.x86_64.zip
          
          wget "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          7z x Godot_v4.6.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/
          mv templates ~/.local/share/godot/export_templates/4.6.2.stable
          
      - name: Export Project
        run: | 
          mkdir export
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --export-debug Web export/index.html

      - uses: actions/upload-artifact@v7
        with:
          path: export
